# config/org_structure.yaml
# Организационная структура для валидации поручений.
#
# Формат:
#   employees:
#     - login:     <уникальный логин сотрудника>
#       name:      <полное имя>
#       role:      <должность>
#       team:      <название отдела / команды>
#       manager:   <логин руководителя> | null
#       subordinates:
#         - <логин подчинённого 1>
#         - <логин подчинённого 2>
#
# Порядок валидации:
#   - Руководитель -> подчинённый: ✅ валидно, задача создаётся
#   - Разные отделы:               ⚠️ требуется подтверждение
#   - Подчинённый -> руководитель: ❌ заблокировано
#   - Нет полномочий:              ❌ заблокировано
#
# Замените сотрудников на вашу реальную структуру.

